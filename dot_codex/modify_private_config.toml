#!/bin/sh
if command -v dasel >/dev/null 2>&1; then
    dasel_command=dasel
elif command -v mise >/dev/null 2>&1; then
    dasel_command="$(mise which dasel 2>/dev/null)"
fi

if [ -z "${dasel_command:-}" ]; then
    echo "dasel is required to manage ~/.codex/config.toml" >&2
    exit 1
fi

# Read stdin (existing file content from chezmoi)
input=$(cat)

# If the file doesn't exist or is empty, provide a minimal TOML so the query can safely spread null maps
if [ -z "$input" ]; then
    input='[features]
[mcp_servers]
[sandbox_workspace_write]'
elif ! printf '%s\n' "$input" | grep -q '^\[sandbox_workspace_write\]'; then
    input="$input

[sandbox_workspace_write]"
fi

query='
  $features = $root.features;
  $mcp_servers = $root.mcp_servers;
  $sandbox_workspace_write = $root.sandbox_workspace_write;

  $root = {
    $root...,
    "model": "gpt-5.5",
    "model_reasoning_effort": "high",
    "personality": "pragmatic",
    "service_tier": "fast",
    "approvals_reviewer": "auto_review",
    "features": {
      $features...,
      "unified_exec": true,
      "shell_snapshot": true,
      "multi_agent": true,
      "apps": false,
      "memories": false
    },
    "sandbox_workspace_write": {
      $sandbox_workspace_write...,
      "writable_roots": [
        "~/.local/share/chezmoi",
        "~/Sources"
      ]
    },
    "mcp_servers": {
      $mcp_servers...,
      "context7": {
        "url": "https://mcp.context7.com/mcp",
        "env_http_headers": {
          "CONTEXT7_API_KEY": "CONTEXT7_API_KEY"
        },
        "startup_timeout_sec": 40
      },
      "exa": {
        "command": "npx",
        "args": [
          "-y",
          "exa-mcp-server",
          "tools=web_search_exa,web_fetch_exa,web_search_advanced_exa"
        ],
        "env_vars": ["EXA_API_KEY"]
      }
    }
  };

  $root
'

printf '%s\n' "$input" | "$dasel_command" query -i toml -o toml "$(printf "%s" "$query" | tr '\n' ' ' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
