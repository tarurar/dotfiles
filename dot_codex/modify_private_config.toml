#!/bin/sh
if command -v dasel >/dev/null 2>&1; then
    dasel_command=dasel
elif command -v mise >/dev/null 2>&1; then
    dasel_command="$(mise which dasel 2>/dev/null)"
fi

if [ -z "${dasel_command:-}" ]; then
    echo "dasel is required to manage ~/.codex/config.toml" >&2
    exit 1
fi

query='
  $features = $root.features;
  $mcp_servers = $root.mcp_servers;

  $root = {
    $root...,
    "model": "gpt-5.5",
    "model_reasoning_effort": "high",
    "personality": "pragmatic",
    "service_tier": "fast",
    "features": {
      $features...,
      "unified_exec": true,
      "shell_snapshot": true,
      "multi_agent": true,
      "apps": false
    },
    "mcp_servers": {
      $mcp_servers...,
      "context7": {
        "url": "https://mcp.context7.com/mcp",
        "env_http_headers": {
          "CONTEXT7_API_KEY": "CONTEXT7_API_KEY"
        }
      },
      "exa": {
        "command": "npx",
        "args": [
          "-y",
          "exa-mcp-server",
          "tools=web_search_exa,web_fetch_exa,web_search_advanced_exa"
        ],
        "env_vars": ["EXA_API_KEY"]
      }
    }
  };

  $root
'

"$dasel_command" query -i toml -o toml "$(printf "%s" "$query" | tr '\n' ' ' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
