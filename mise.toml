[settings]
experimental = true
verbose = false

[env]
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"
DOTNET_SKIP_FIRST_TIME_EXPERIENCE = "1"
DOTNET_ReadyToRun = "1"
DOTNET_TC_QuickJitForLoops = "1"
ASPNETCORE_ENVIRONMENT = "Development"
DOTNET_WATCH_RESTART_ON_RUDE_EDIT = "1"
DOTNET_USE_POLLING_FILE_WATCHER = "0"  # Reduces file watcher overhead
MSBuildNodeReuseTimeout = "900"
DOTNET_CLI_UI_LANGUAGE = "en"  # Skip locale detection
MSBuildEnableWorkloadResolver = "false"  # Skip workload resolution if not needed
DOTNET_MaxDegreeOfParallelism = "24"
XUNIT_MAXPARALLEL = "24"
# Route dotnet through rtk when installed for compact output; fall back to plain dotnet.
RTK_DOTNET = '''{{ exec(command='command -v rtk >/dev/null 2>&1 && printf "rtk dotnet" || printf dotnet', cache_key='rtk_dotnet', cache_duration='1h') }}'''

[tasks."dotnet:restore"]
description = "Restore NuGet packages with optimizations"
quiet = true
dir = "{{ cwd }}"
run = '''
set -e
SOLUTION_FILE=$(mise run find-solution)

$RTK_DOTNET restore "${SOLUTION_FILE}" \
    --use-lock-file \
    --locked-mode \
    -maxcpucount:12 \
    --nologo
'''

[tasks."dotnet:build"]
description = "Builds the .NET solution. Warnings are NOT treated as errors."
quiet = true
dir = "{{ cwd }}"
run = '''
set -e
SOLUTION_FILE=$(mise run find-solution)
MAX_CPU_COUNT=12
if [ "${CODEX_SANDBOX_NETWORK_DISABLED:-}" = "1" ]; then
    MAX_CPU_COUNT=1
fi

$RTK_DOTNET build "${SOLUTION_FILE}" \
    /property:Configuration=Debug \
    /property:GenerateFullPaths=true \
    /consoleloggerparameters:NoSummary \
    /property:GenerateDocumentation=false \
    /property:IsLocalBuild=true \
    -maxcpucount:"${MAX_CPU_COUNT}" \
    -nodeReuse:true \
    /property:UseSharedCompilation=true \
    /property:BuildInParallel=true
'''

[tasks."dotnet:build:fast"]
description = "Builds the .NET solution quickly just for development."
quiet = true
dir = "{{ cwd }}"
run = '''
set -e
SOLUTION_FILE=$(mise run find-solution)

$RTK_DOTNET build "${SOLUTION_FILE}" \
    /property:Configuration=Debug \
    /property:IsLocalBuild=true \
    --nologo \
    --no-restore \
    -maxcpucount:12 \
    -nodeReuse:true \
    /property:UseSharedCompilation=true \
    /property:BuildInParallel=true
'''

[tasks."dotnet:build:strict"]
description = "Builds the .NET solution from the scratch. Warnings are treated as errors."
quiet = true
dir = "{{ cwd }}"
run = '''
set -e
SOLUTION_FILE=$(mise run find-solution)

$RTK_DOTNET build "${SOLUTION_FILE}" \
    /property:Configuration=Debug \
    /property:GenerateFullPaths=true \
    /consoleloggerparameters:NoSummary \
    /property:GenerateDocumentation=false \
    /property:IsLocalBuild=true \
    /property:TreatWarningsAsErrors=true \
    /warnaserror \
    --no-incremental
'''

[tasks."dotnet:coverage"]
depends = ["dotnet:build"]
description = "Runs tests with Coverlet and generates HTML/Text reports with ReportGenerator"
quiet = true
dir = "{{ cwd }}"
run = '''
set -e

# ====================================================================
# PREREQUISITES:
# This task requires the ReportGenerator global tool to be installed.
#
# To install it, run:
#   dotnet tool install -g dotnet-reportgenerator-globaltool
#
# To update to the latest version, run:
#   dotnet tool update -g dotnet-reportgenerator-globaltool
#
# To verify it's installed, run:
#   reportgenerator --version
# ====================================================================

# Clean up old coverage results
rm -rf CoverageResults/
rm -rf tests/*/TestResults/

# Set up exclude parameter if defined
EXCLUDE_PARAM=""
if [ -n "${COVERAGE_EXCLUDE:-}" ]; then
    EXCLUDE_PARAM="/p:Exclude=\"${COVERAGE_EXCLUDE}\""
fi

# Find all test projects
TEST_PROJECTS=$(find tests -name "*.csproj" -type f | grep -v "TestHelpers" | sort)

echo "🔍 Running tests and collecting coverage with Coverlet..."
echo ""

# Run tests for each project and collect coverage
for PROJECT in $TEST_PROJECTS; do
    PROJECT_NAME=$(basename -s .csproj "$PROJECT")
    echo "📊 Testing $PROJECT_NAME..."

    dotnet test "$PROJECT" \
        --no-build \
        --logger "console;verbosity=minimal" \
        /p:CollectCoverage=true \
        /p:CoverletOutput="../../CoverageResults/${PROJECT_NAME}.cobertura.xml" \
        /p:CoverletOutputFormat="cobertura" \
        /p:SkipAutoProps=true \
        ${EXCLUDE_PARAM} \
        -- RunConfiguration.MaxCpuCount=12
done

echo ""
echo "📈 Generating coverage reports..."

# Find all source directories (excluding test directories)
SOURCE_DIRS=$(find . -name "*.csproj" -not -path "./tests/*" -not -path "./CoverageResults/*" -exec dirname {} \; | sort -u | tr '\n' ';')

# Generate HTML and Text reports using ReportGenerator
reportgenerator \
    -reports:"CoverageResults/*.cobertura.xml" \
    -targetdir:"CoverageResults/html" \
    -sourcedirs:"${SOURCE_DIRS}" \
    -reporttypes:"Html;TextSummary" \
    -verbosity:"Error" \
    -assemblyfilters:"-xunit*;-*.Tests;-*.IntegrationTests" \
    -classfilters:"-*.Migrations.*"

# Display the text summary in terminal
echo ""
echo "📊 Coverage Summary:"
echo "===================="
cat CoverageResults/html/Summary.txt

# Get absolute path and print clickable URL
REPORT_PATH=$(realpath CoverageResults/html/index.html)
echo ""
echo "✅ Coverage report generated successfully!"
echo ""
echo "📂 HTML Report: file://${REPORT_PATH}"
echo ""
echo "💡 Click the link above or run: xdg-open \"file://${REPORT_PATH}\""
'''

[tasks."dotnet:test"]
description = "Runs the .NET unit tests (excludes integration tests)"
quiet = true
dir = "{{ cwd }}"
run = '''
set -e

mise run dotnet:test:projects -- unit
'''

[tasks."dotnet:test:smoke"]
description = "Runs the .NET unit tests quickly by excluding slow tests (e.g. real network timeouts)"
quiet = true
dir = "{{ cwd }}"
run = '''
set -e

mise run dotnet:test:projects -- unit "Category!=Slow"
'''

[tasks."dotnet:test:projects"]
hide = true
description = "Runs test projects discovered from a solution or project tree"
quiet = true
dir = "{{ cwd }}"
run = '''
#!/usr/bin/env bash
set -e

MODE="${1:-unit}"
FILTER="${2:-}"
SOLUTION_FILE=$(mise run find-solution 2>/dev/null || true)
ROOT="${MISE_ORIGINAL_CWD:-$PWD}"

if [ -n "$SOLUTION_FILE" ]; then
    ROOT=$(dirname "$SOLUTION_FILE")
fi

build_fast() {
    local TARGET=$1

    $RTK_DOTNET build "$TARGET" \
        /property:Configuration=Debug \
        /property:IsLocalBuild=true \
        --nologo \
        --no-restore \
        -maxcpucount:12 \
        -nodeReuse:true \
        /property:UseSharedCompilation=true \
        /property:BuildInParallel=false
}

build_full() {
    local TARGET=$1

    $RTK_DOTNET build "$TARGET" \
        /property:Configuration=Debug \
        /property:GenerateFullPaths=true \
        /consoleloggerparameters:NoSummary \
        /property:GenerateDocumentation=false \
        /property:IsLocalBuild=true \
        -maxcpucount:12 \
        -nodeReuse:true \
        /property:UseSharedCompilation=true \
        /property:BuildInParallel=false
}

if [ "$MODE" = "full" ] && [ -n "$SOLUTION_FILE" ]; then
    build_full "$SOLUTION_FILE"
    dotnet test --no-build "$SOLUTION_FILE"
    exit 0
fi

list_solution_projects() {
    local SOLUTION=$1
    local SOLUTION_DIR

    SOLUTION_DIR=$(dirname "$SOLUTION")
    $RTK_DOTNET sln "$SOLUTION" list \
        | sed '1,2d' \
        | while IFS= read -r PROJECT; do
            if [ -z "$PROJECT" ]; then
                continue
            fi

            case "$PROJECT" in
                /*) printf '%s\n' "$PROJECT" ;;
                *) realpath -m "$SOLUTION_DIR/$PROJECT" ;;
            esac
        done
}

find_project_files() {
    find "$ROOT" -maxdepth 5 \
        \( -type d \( -name .git -o -name .idea -o -name .vs -o -name bin -o -name obj \) -prune \) -o \
        \( -type f -name "*.csproj" -print \) \
        2>/dev/null | sort
}

is_test_project() {
    local PROJECT=$1

    grep -Eiq \
        '<IsTestProject>[[:space:]]*true[[:space:]]*</IsTestProject>|Microsoft\.NET\.Test\.Sdk|xunit\.runner\.visualstudio|NUnit3TestAdapter|MSTest\.TestAdapter' \
        "$PROJECT"
}

is_integration_project() {
    local PROJECT=$1
    local LOWER

    LOWER=$(printf '%s' "$PROJECT" | tr '[:upper:]' '[:lower:]')
    case "$LOWER" in
        *integrationtest*|*/integration/*|*/integrationtests/*)
            return 0
            ;;
        *)
            return 1
            ;;
    esac
}

mapfile -t PROJECTS < <(
    if [ -n "$SOLUTION_FILE" ]; then
        list_solution_projects "$SOLUTION_FILE"
    else
        find_project_files
    fi
)

TEST_PROJECTS=()
EXCLUDED_PROJECTS=0
TEST_PROJECT_COUNT=0
PROJECT_COUNT=0

for PROJECT in "${PROJECTS[@]}"; do
    PROJECT_COUNT=$((PROJECT_COUNT + 1))

    if ! is_test_project "$PROJECT"; then
        continue
    fi

    if [ "$MODE" != "full" ] && is_integration_project "$PROJECT"; then
        EXCLUDED_PROJECTS=$((EXCLUDED_PROJECTS + 1))
        continue
    fi

    TEST_PROJECTS+=("$PROJECT")
    TEST_PROJECT_COUNT=$((TEST_PROJECT_COUNT + 1))
done

echo "Solution: ${SOLUTION_FILE:-none}"
echo "Projects discovered: $PROJECT_COUNT"
echo "Test projects selected: $TEST_PROJECT_COUNT"
echo "Integration projects excluded: $EXCLUDED_PROJECTS"

if [ -z "${TEST_PROJECTS[*]}" ]; then
    echo "No test projects found"
    exit 0
fi

echo "Building selected test project dependency graphs..."
for PROJECT in "${TEST_PROJECTS[@]}"; do
    NAME=$(basename -s .csproj "$PROJECT")
    echo "Building dependency graph for $NAME..."

    if [ "$MODE" = "full" ]; then
        build_full "$PROJECT"
    else
        build_fast "$PROJECT"
    fi
done

TEST_FILTER_ARGS=()
if [ -n "$FILTER" ]; then
    TEST_FILTER_ARGS=(--filter "$FILTER")
fi

WORK=$(mktemp -d)
trap 'rm -rf "$WORK"' EXIT

declare -A PID_PROJECT
PIDS=""
PROJECT_COUNT=0

for PROJECT in "${TEST_PROJECTS[@]}"; do
    NAME=$(basename -s .csproj "$PROJECT")
    OUTFILE="$WORK/$NAME.log"
    dotnet test --no-build "$PROJECT" "${TEST_FILTER_ARGS[@]}" \
        -- RunConfiguration.MaxCpuCount=24 \
           RunConfiguration.DisableAppDomain=true \
           xUnit.MaxParallelThreads=24 \
           NUnit.NumberOfTestWorkers=24 \
        > "$OUTFILE" 2>&1 &
    PID=$!
    PIDS="$PIDS $PID"
    PID_PROJECT[$PID]="$NAME"
    PROJECT_COUNT=$((PROJECT_COUNT + 1))
done

echo "Running $PROJECT_COUNT test projects..."

FAILED_PROJECTS=""
TOTAL_PASSED=0
TOTAL_FAILED=0
TOTAL_SKIPPED=0

mark_failed() {
    local NAME=$1

    case " $FAILED_PROJECTS " in
        *" $NAME "*) ;;
        *) FAILED_PROJECTS="$FAILED_PROJECTS $NAME" ;;
    esac
}

collect_result() {
    local PID=$1
    local NAME="${PID_PROJECT[$PID]}"
    local OUTFILE="$WORK/$NAME.log"
    local SUMMARY
    SUMMARY=$(grep -E "^(Passed!|Failed!|ok dotnet test:|fail dotnet test:)" "$OUTFILE" 2>/dev/null || echo "")

    if [ -n "$SUMMARY" ]; then
        echo "$SUMMARY"
        if echo "$SUMMARY" | grep -Eq "^(ok|fail) dotnet test:"; then
            P=$(echo "$SUMMARY" | grep -oE '[0-9]+ (tests? )?passed' | head -n1 | grep -oE '[0-9]+' || echo 0)
            F=$(echo "$SUMMARY" | grep -oE '[0-9]+ (tests? )?failed' | head -n1 | grep -oE '[0-9]+' || echo 0)
            S=$(echo "$SUMMARY" | grep -oE '[0-9]+ (tests? )?skipped' | head -n1 | grep -oE '[0-9]+' || echo 0)
        else
            P=$(echo "$SUMMARY" | grep -oP 'Passed:\s*\K\d+' || echo 0)
            F=$(echo "$SUMMARY" | grep -oP 'Failed:\s*\K\d+' || echo 0)
            S=$(echo "$SUMMARY" | grep -oP 'Skipped:\s*\K\d+' || echo 0)
        fi
        TOTAL_PASSED=$((TOTAL_PASSED + P))
        TOTAL_FAILED=$((TOTAL_FAILED + F))
        TOTAL_SKIPPED=$((TOTAL_SKIPPED + S))
    else
        echo "???  - $NAME (no summary line)"
        mark_failed "$NAME"
    fi
}

REMAINING="$PIDS"
while [ -n "$REMAINING" ]; do
    STILL_RUNNING=""
    for PID in $REMAINING; do
        if ! kill -0 "$PID" 2>/dev/null; then
            wait "$PID" || mark_failed "${PID_PROJECT[$PID]}"
            collect_result "$PID"
        else
            STILL_RUNNING="$STILL_RUNNING $PID"
        fi
    done
    REMAINING="$STILL_RUNNING"
    [ -n "$REMAINING" ] && sleep 0.2
done

echo ""
echo "Total: $TOTAL_PASSED passed, $TOTAL_FAILED failed, $TOTAL_SKIPPED skipped"

if [ -n "$FAILED_PROJECTS" ]; then
    echo ""
    echo "=== Failed project output ==="
    for NAME in $FAILED_PROJECTS; do
        echo ""
        echo "--- $NAME ---"
        cat "$WORK/$NAME.log"
    done
    exit 1
fi
'''

[tasks."dotnet:test:full"]
description = "Runs all .NET tests including integration tests"
quiet = true
dir = "{{ cwd }}"
run = '''
set -e

mise run dotnet:test:projects -- full
'''
